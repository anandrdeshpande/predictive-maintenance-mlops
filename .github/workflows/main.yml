name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout project repository code (Updated to v4)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Python environment (Updated to v5)
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Build the Docker Image
    - name: Build Docker Image
      run: |
        docker build -t predictive-maintenance-api:latest .

    # 5. Run and Test Docker Container
    - name: Test Docker Container Execution
      run: |
        # Run container in background (-d)
        docker run -d -p 8000:8000 --name test-api predictive-maintenance-api:latest
        
        # Give Uvicorn 10 seconds to spin up completely
        sleep 10
        
        # Output running container logs for debugging visibility
        docker logs test-api
        
        # Test the health check endpoint
        curl -f http://localhost:8000/