name: MLOps CI/CD Pipeline

# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout project repository code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up Python environment
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Build the Docker Image
    - name: Build Docker Image
      run: |
        docker build -t predictive-maintenance-api:latest .

    # 5. Run and Test Docker Container
    - name: Test Docker Container Execution
      run: |
        # Run container in background (-d)
        docker run -d -p 8000:8000 --name test-api predictive-maintenance-api:latest
        
        # Give the container a few seconds to start Uvicorn
        sleep 5
        
        # Test the health check endpoint using curl
        curl http://localhost:8000/